- name: "type: bug"
  color: "d73a4a"
  description: "Something is broken or behaves incorrectly"
- name: "type: feature"
  color: "a2eeef"
  description: "A new capability or user-facing feature request"
- name: "type: enhancement"
  color: "84b6eb"
  description: "Improvement to an existing behavior or experience"
- name: "type: docs"
  color: "0075ca"
  description: "Documentation changes"
- name: "type: question"
  color: "d876e3"
  description: "Usage, development, or product question"

- name: "area: timeline"
