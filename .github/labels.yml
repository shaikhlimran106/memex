- name: "area: ios"
  color: "c5def5"
  description: "iOS-specific behavior"
- name: "area: android"
  color: "c5def5"
  description: "Android-specific behavior"
- name: "area: i18n"
  color: "c5def5"
  description: "Localization and translations"
- name: "area: ux"
  color: "c5def5"
  description: "User experience, interaction design, and polish"

- name: "priority: p0"
  color: "b60205"
  description: "Data loss, privacy leak, launch crash, or core flow broken"
- name: "priority: p1"
  color: "d93f0b"
  description: "High-impact bug or blocked common workflow"
- name: "priority: p2"
  color: "fbca04"
  description: "Meaningful improvement or common issue"
- name: "priority: p3"
  color: "fef2c0"
  description: "Nice-to-have, experimental, or long-term idea"

- name: "needs triage"
  color: "ededed"
  description: "Needs maintainer review and labels"
- name: "needs info"
  color: "ededed"
  description: "Waiting for more information from the author"
- name: "needs reproduction"
  color: "ededed"
  description: "Needs a reliable reproduction case"
- name: "needs product decision"
  color: "ededed"
  description: "Needs maintainer direction before implementation"
- name: "accepted"
  color: "0e8a16"
  description: "Direction accepted, but not necessarily scheduled"
- name: "ready for contributor"
  color: "0e8a16"
  description: "Scope is clear enough for community implementation"
- name: "good first issue"
  color: "7057ff"
  description: "Good entry point for new contributors"
- name: "help wanted"
  color: "008672"
  description: "Maintainers welcome community implementation"
- name: "not planned"
  color: "ffffff"
  description: "Outside the current product direction or maintenance scope"
- name: "duplicate"
  color: "cfd3d7"
  description: "Already tracked elsewhere"
