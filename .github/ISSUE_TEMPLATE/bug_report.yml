name: Bug report
description: Report a reproducible problem in Memex
title: "[Bug]: "
labels: ["type: bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for maintainers or contributors to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us exactly what you did.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - iOS
        - Android
        - Both
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Memex version or commit
      placeholder: "Example: v0.1.0 or abc1234"
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or recordings
      description: Remove API keys, private records, personal photos, and other sensitive data before posting.
      render: shell
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private records, API keys, screenshots with sensitive data, and local file paths that should not be public.
          required: true

