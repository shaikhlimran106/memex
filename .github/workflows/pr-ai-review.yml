name: PR AI Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Open pull request number to review"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-ai-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: PR AI Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      HAS_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
      AI_PR_REVIEW_ENFORCE: ${{ vars.AI_PR_REVIEW_ENFORCE }}

    steps:
      - name: Check out trusted base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Resolve PR metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p pr-ai-review-input
          gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json number,title,body,headRefName,headRefOid,baseRefName,baseRefOid,url \
            > pr-ai-review-input/pr-github.json

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          pr = json.loads(Path("pr-ai-review-input/pr-github.json").read_text())
          env_path = Path(os.environ["GITHUB_ENV"])
          with env_path.open("a", encoding="utf-8") as env:
              env.write(f"PR_BASE_REF={pr['baseRefName']}\n")
          PY

      - name: Fetch PR ref as data
        run: |
          git fetch --no-tags origin \
            "${PR_BASE_REF}:refs/remotes/origin/${PR_BASE_REF}"
          git fetch --no-tags origin \
            "pull/${PR_NUMBER}/head:refs/remotes/origin/pr-head"

      - name: Prepare AI review input
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          pr = json.loads(Path("pr-ai-review-input/pr-github.json").read_text())
          Path("pr-ai-review-input/pr-title.txt").write_text(
              pr.get("title") or "",
              encoding="utf-8",
          )
          Path("pr-ai-review-input/pr-body.txt").write_text(
              pr.get("body") or "",
              encoding="utf-8",
          )
          context = {
              "schema_version": 1,
              "workflow": "PR AI Review",
              "artifact": "pr-ai-review",
              "pr_number": pr["number"],
              "head_sha": pr["headRefOid"],
              "head_ref": pr["headRefName"],
              "base_sha": pr["baseRefOid"],
              "base_ref": pr["baseRefName"],
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "html_url": pr.get("url", ""),
          }
          Path("pr-ai-review-input/pr-context.json").write_text(
              json.dumps(context, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          git diff --name-status --find-renames --find-copies \
            "refs/remotes/origin/${PR_BASE_REF}...refs/remotes/origin/pr-head" \
            > pr-ai-review-input/pr-files.txt

          git diff --no-ext-diff --unified=80 --find-renames --find-copies \
            "refs/remotes/origin/${PR_BASE_REF}...refs/remotes/origin/pr-head" \
            > pr-ai-review-input/pr-diff.full.patch

          python3 - <<'PY'
          from pathlib import Path

          source = Path("pr-ai-review-input/pr-diff.full.patch")
          target = Path("pr-ai-review-input/pr-diff.patch")
          raw = source.read_bytes()
          limit = 220_000
          if len(raw) <= limit:
              target.write_bytes(raw)
          else:
              target.write_bytes(
                  raw[:limit]
                  + b"\n\n[PR AI Review note: diff truncated at 220000 bytes]\n"
              )
          source.unlink(missing_ok=True)
          PY

          python3 scripts/pr_policy_check.py \
            --repo-path . \
            --base "refs/remotes/origin/${PR_BASE_REF}" \
            --head "refs/remotes/origin/pr-head" \
            --pr-title-file pr-ai-review-input/pr-title.txt \
            --pr-body-file pr-ai-review-input/pr-body.txt \
            --output pr-ai-review-input/pr-policy-preflight.json \
            --markdown-output pr-ai-review-input/pr-policy-preflight.md \
            --no-fail-on-decision

      - name: Run Claude AI review
        id: claude-ai-review
        if: env.HAS_ANTHROPIC_API_KEY == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: mimo-v2.5-pro
          ANTHROPIC_CUSTOM_MODEL_OPTION: mimo-v2.5-pro
          ANTHROPIC_CUSTOM_MODEL_OPTION_NAME: MIMO v2.5 Pro
          ANTHROPIC_DEFAULT_OPUS_MODEL: mimo-v2.5-pro
          ANTHROPIC_DEFAULT_SONNET_MODEL: mimo-v2.5-pro
          ANTHROPIC_DEFAULT_HAIKU_MODEL: mimo-v2.5-pro
          CLAUDE_CODE_DISABLE_1M_CONTEXT: "1"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          prompt: |
            Read `.github/claude/pr-ai-review-prompt.md` and perform that review now.
          claude_args: >-
            --model "mimo-v2.5-pro"
            --tools "Read"
            --allowedTools "Read"
          display_report: "false"
          show_full_output: "false"

      - name: Write Claude structured result
        if: always() && env.HAS_ANTHROPIC_API_KEY == 'true'
        env:
          STRUCTURED_OUTPUT: ${{ steps.claude-ai-review.outputs.structured_output }}
          EXECUTION_FILE: ${{ steps.claude-ai-review.outputs.execution_file }}
        run: |
          python3 scripts/extract_claude_structured_review.py \
            --output ai-review-raw.json

          if [ -n "$EXECUTION_FILE" ] && [ -f "$EXECUTION_FILE" ]; then
            cp "$EXECUTION_FILE" claude-execution-output.json
          fi

      - name: Write fallback result when Claude did not produce JSON
        if: always() && env.HAS_ANTHROPIC_API_KEY == 'true'
        run: |
          if [ -f ai-review-raw.json ]; then
            exit 0
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          result = {
              "schema_version": 1,
              "risk_level": "high",
              "human_review_required": True,
              "golden_path_impact": {
                  "level": "possible",
                  "paths": ["none"],
                  "reason_zh": "Claude Code Action 未产出结构化 JSON，AI 语义预检结果不可用。",
                  "reason_en": "Claude Code Action did not produce structured JSON, so the AI review result is unavailable.",
              },
              "summary_zh": "AI 语义预检未得到可解析结果，需要 maintainer 人工审核。",
              "summary_en": "AI semantic review did not return a parseable result; maintainer review is required.",
              "affected_areas": ["unknown"],
              "findings": [
                  {
                      "severity": "high",
                      "category": "review_context",
                      "title_zh": "AI review 结果不可用",
                      "title_en": "AI review result unavailable",
                      "evidence": ["Claude Code Action structured_output was empty or invalid."],
                      "recommendation_zh": "检查 Claude Action 日志和模型网关配置后重新运行 workflow。",
                      "recommendation_en": "Check Claude Action logs and model gateway configuration, then rerun the workflow.",
                      "blocks_merge": False,
                  }
              ],
              "test_gaps": [],
              "confidence": "high",
          }
          Path("ai-review-raw.json").write_text(
              json.dumps(result, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Write skipped result when Claude is not configured
        if: env.HAS_ANTHROPIC_API_KEY != 'true'
        run: |
          cat > ai-review-raw.json <<'JSON'
          {
            "schema_version": 1,
            "risk_level": "high",
            "human_review_required": true,
            "golden_path_impact": {
              "level": "possible",
              "paths": ["none"],
              "reason_zh": "仓库未配置 ANTHROPIC_API_KEY，AI 语义预检未运行。",
              "reason_en": "ANTHROPIC_API_KEY is not configured, so AI semantic review did not run."
            },
            "summary_zh": "AI 语义预检被跳过，需要 maintainer 人工审核。",
            "summary_en": "AI semantic review was skipped; maintainer review is required.",
            "affected_areas": ["unknown"],
            "findings": [
              {
                "severity": "high",
                "category": "review_context",
                "title_zh": "AI review 未配置",
                "title_en": "AI review is not configured",
                "evidence": ["Repository secret ANTHROPIC_API_KEY is missing."],
                "recommendation_zh": "在仓库 Secrets 中配置 ANTHROPIC_API_KEY 后重新运行 workflow。",
                "recommendation_en": "Configure ANTHROPIC_API_KEY in repository secrets and rerun the workflow.",
                "blocks_merge": false
              }
            ],
            "test_gaps": [],
            "confidence": "high"
          }
          JSON

      - name: Publish AI review report
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/pr_ai_review_report.py \
            --repo "${{ github.repository }}" \
            --pr-number "${PR_NUMBER}" \
            --context pr-ai-review-input/pr-context.json \
            --result ai-review-raw.json \
            --json-output ai-review.json \
            --markdown-output ai-review.md \
            --post-comment \
            --sync-labels

          cat ai-review.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce AI review decision
        if: env.AI_PR_REVIEW_ENFORCE == 'true'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          review = json.loads(Path("ai-review.json").read_text(encoding="utf-8"))
          if review.get("human_review_required"):
              raise SystemExit("AI review requires maintainer review.")
          PY

      - name: Upload AI review result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-ai-review
          if-no-files-found: warn
          path: |
            pr-ai-review-input/pr-context.json
            pr-ai-review-input/pr-files.txt
            pr-ai-review-input/pr-policy-preflight.json
            pr-ai-review-input/pr-policy-preflight.md
            ai-review-raw.json
            ai-review.json
            ai-review.md
            claude-execution-output.json
