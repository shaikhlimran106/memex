name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Build flavor (global or cn)'
        required: true
        default: 'global'
        type: choice
        options:
          - global
          - cn

jobs:
  build:
    name: Build Release APK (arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore signing config
        run: |
          # 解码 keystore → android/app/memex-release.jks
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/memex-release.jks
          # 写入 properties → android/key-{flavor}.properties
          # storeFile 路径是相对于 android/app/ 的，所以写 memex-release.jks
          cat > android/key-${{ github.event.inputs.flavor }}.properties <<'EOF'
          storeFile=memex-release.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          EOF
          # 验证文件存在
          echo "=== 验证文件 ==="
          ls -la android/*.properties
          ls -la android/app/memex-release.jks
          file android/app/memex-release.jks

      - name: Build arm64 APK
        run: |
          flutter build apk --release \
            --flavor ${{ github.event.inputs.flavor }} \
            --target-platform android-arm64

      - name: Verify APK signature
        run: |
          # 安装 apksigner（Android SDK build-tools 自带）
          apksigner=$(find $ANDROID_HOME -name "apksigner" -type f 2>/dev/null | head -1)
          if [ -n "$apksigner" ]; then
            echo "=== APK 签名验证 ==="
            $apksigner verify --print-certs build/app/outputs/flutter-apk/*.apk || echo "⚠️ 签名验证失败"
          fi

      - name: Collect APK
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/*.apk artifacts/
          ls -lah artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: memex-${{ github.event.inputs.flavor }}-arm64
          path: artifacts/*.apk
